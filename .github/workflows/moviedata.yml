name: Movie Data API

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: moviedataapi
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Create Directories
        run: |
          mkdir -p data
          mkdir -p logs

      - name: Run Movie Data Fetcher
        run: |
          python moviedataapi.py

      - name: Show Stats
        run: |
          echo "Data files:"
          find data -type f | wc -l

          echo "Fetched:"
          wc -l logs/alreadyfetched.txt || true

          echo "Failed:"
          wc -l logs/failed.txt || true

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/
          git add logs/

          git diff --cached --quiet && exit 0

          git commit -m "update movie data"

      - name: Push Changes
        run: |
          git push
